<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/components/header.css">
    <link rel="stylesheet" href="../../css/components/footer.css">
    <link rel="stylesheet" href="../../css/pages/detail.css">
    <link rel="stylesheet"href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"/>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="../../js/components/header.js"></script>
</head>
<body>
    <div id="site-header"></div>

    <div class="detail-wrap">
        <div class="common-frame">
            <div class="img-box">
                
                <!-- Swiper -->
                <div style="--swiper-navigation-color: #fff; --swiper-pagination-color: #fff" class="swiper mySwiper2">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">
                            <img src="../../images/detail-page/detail-01/detail-1.jpg" />
                        </div>
                        <div class="swiper-slide">
                            <img src="../../images/detail-page/detail-01/detail-2.jpg" />
                        </div>
                        <div class="swiper-slide">
                            <img src="../../images/detail-page/detail-01/detail-3.jpg" />
                        </div>
                    </div>
                    <div class="swiper-button-next"></div>
                    <div class="swiper-button-prev"></div>
                </div>
                <div thumbsSlider="" class="swiper mySwiper">
                    <div class="swiper-wrapper">
                        <div class="swiper-slide">
                            <img src="../../images/detail-page/detail-01/detail-1.jpg" />
                        </div>
                        <div class="swiper-slide">
                            <img src="../../images/detail-page/detail-01/detail-2.jpg" />
                        </div>
                        <div class="swiper-slide">
                            <img src="../../images/detail-page/detail-01/detail-3.jpg" />
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="site-footer"></div>
    <script src="../../js/components/layout.js"></script>
    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <!-- Initialize Swiper -->
  <script>
    var swiper = new Swiper(".mySwiper", {
      spaceBetween: 10,
      slidesPerView: 4,
      freeMode: true,
      watchSlidesProgress: true,
    });
    var swiper2 = new Swiper(".mySwiper2", {
      spaceBetween: 10,
      navigation: {
        nextEl: ".swiper-button-next",
        prevEl: ".swiper-button-prev",
      },
      thumbs: {
        swiper: swiper,
      },
    });
  </script>
</body>
</html>
