<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/components/header.css">
    <link rel="stylesheet" href="../../css/components/footer.css">
    <script src="../../js/components/header.js"></script>
    <link rel="stylesheet" href="../../css/pages/map.css">
</head>
<body>
    <div id="site-header"></div>
    <div class="map common-frame">
        <h1>찾아오시는 길</h1>
        <div class="map-box">
           <figure class="map-photo">
               <img src="../../images/map/map.png" alt="2uc지도">
           </figure>
           <figure class="store-photo">
               <img src="../../images/map/studio.jpg" alt="스튜디오 외관사진">
           </figure>
        </div>
        <div class="location-box">
           <div class="walk">
               <h4>도보 이용</h4>
               <p>약수역 1번 또는 10번 출구에서 다산로 방향으로 약 200m 직진하시면 우측 1층에 위치해 있습니다. (도보 약 3분 소요)</p>
           </div>
           <div class="bus">
               <h4>대중교통 이용</h4>
               <p>지하철 3호선 및 6호선 약수역에서 하차 후 1번 출구로 나오시면 가장 빠르게 방문하실 수 있습니다.</p>
           </div>
           <div class="car">
               <h4>자차로 오시는 경우</h4>
               <p>네비게이션에 '다산로 60'을 검색해 오세요. 건물 전면 주차 공간이 협소할 수 있으니 도착 전 고객센터로 문의 부탁드립니다.(2시간 주차권 발행)</p>
           </div>
        </div>
    </div>
    <div id="site-footer"></div>
    <script src="../../js/components/layout.js"></script>
</body>
</html>
