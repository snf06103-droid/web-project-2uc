<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/components/header.css">
    <link rel="stylesheet" href="../../css/components/footer.css">
    <script src="../../js/components/header.js"></script>
    <link rel="stylesheet" href="/css/pages/login.css">
    <script src="/js/pages/login.js"></script>
</head>
<body>
    <div id="site-header"></div>
    
    <div class="login-container container1">
        <div class="login-type">
            <h1 class="point">Log In</h1>
            <div class="login-tabs">
                <label for="login">
                    <input type="radio" id="login" name="user-type" checked>
                    로그인
                </label>
                <label for="nonmember">
                    <input type="radio" id="nonmember" name="user-type">
                    비회원 주문조회
                </label>
            </div>
        </div>
    </div>
    <div class="login">
        <div class="login-container container2">
            <div class="user-input">
                <div class="input-box">
                    <label for="user-email">E-mail</label>
                    <input type="text" id="user-email" name="user-email">
                </div>
                <div class="input-box">
                    <label for="user-password">비밀번호</label>
                    <div class="password-input-container">
                        <input type="password" id="user-password" name="user-password">
                        <button type="button" id="password-toggle" class="password-toggle">
                            <img src="/assets/icons/eye.png" alt="비밀번호 보기" id="password-icon">
                            <img src="/assets/icons/eye-closed.png" alt="비밀번호 숨기기" id="password-icon-closed" style="display:none;">
                        </button>
                    </div>
                </div>
            </div>
            <div class="login-auto">
                <input type="checkbox" id="user-remember-id">
                <label class="body2 light" for="user-remember-id">아이디 저장</label>
                <input type="checkbox" id="user-auto-login">
                <label class="body2 light" for="user-auto-login">자동 로그인</label>
            </div>
        </div>
        <div class="login-buttons">
            <span><a href="#">로그인</a></span>
            <div class="login-links">
                <a href="#">아이디 찾기</a>
                <img src="../../assets/icons/slash.png" alt="슬래시">
                <a href="#">비밀번호 찾기</a>
                <img src="../../assets/icons/slash.png" alt="슬래시">
                <a href="#">회원가입</a>
            </div>
        </div>
    </div>

    <div class="nomembership">
        <div class="login-container">
            <div class="user-input">
                <div class="input-box">
                    <label for="user-order-number">주문번호</label>
                    <input type="number" id="user-order-number" name="user-order-number">
                </div>
                <div class="input-box">
                    <label for="user-number">핸드폰번호</label>
                    <input type="number" id="user-number" name="user-number">
                </div>
            </div>
        </div>
        <div class="login-buttons">
            <span><a href="#">주문조회</a></span>
        </div>
    </div>

    <div class="sign-up">
        <div class="sns-icons">
            <p class="body2 light magin05">소셜 로그인</p>
            <a href="#">
                <img src="../../assets/icons/naver-icons.png" alt="네이버 로그인">
                <p class="body2 light">네이버 로그인</p>
            </a>
            <a href="#">
                <img src="../../assets/icons/google-icon.png" alt="구글 로그인">
                <p class="body2 light"> 구글 로그인</p>    
            </a>
            <a href="#">
                <img src="../../assets/icons/kakao-icon.png" alt="카카오 로그인">
                <p class="body2 light">카카오 로그인</p>
            </a>
        </div>
    </div>
    <div id="site-footer"></div>
    <script src="../../js/components/layout.js"></script>
</body>
</html>
